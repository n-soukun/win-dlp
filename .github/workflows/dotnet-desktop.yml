name: .NET Core Desktop Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
      
    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest

    env:
      Solution_Name: otosun.slnx
      # アプリプロジェクトのパス
      App_Project_Path: otosun\otosun.csproj
      # WiXプロジェクトのパス
      Wix_Project_Path: otosun.Installer\otosun.Installer.wixproj
      # WiX v7 のOSMF EULAに同意する環境変数
      WIX_OSMF_ACCEPT_EULA: 'true'

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    # 1. 【アプリのビルド（軽量版の元データ）】
    - name: Publish App (Lightweight)
      run: |
        dotnet publish ${{ env.App_Project_Path }} -c ${{ matrix.configuration }} -r win-x64 --self-contained false -o ./publish_lightweight

    # 2. 【ポータブル版(軽量)の圧縮】
    - name: Zip Portable App (Lightweight)
      run: |
        Compress-Archive -Path ./publish_lightweight/* -DestinationPath ./otosun-portable-lightweight.zip

    # 3. 【ポータブル版(スタンドアロン)の作成 & 圧縮】
    - name: Publish & Zip Portable App (Standalone)
      run: |
        dotnet publish ${{ env.App_Project_Path }} -c ${{ matrix.configuration }} -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish_standalone
        Compress-Archive -Path ./publish_standalone/* -DestinationPath ./otosun-portable-standalone.zip

    # 4. 【MSIインストーラーのビルド】
    - name: Install WiX & Build MSI
      run: |
        dotnet tool install --global wix
        dotnet build ${{ env.Wix_Project_Path }} -c ${{ matrix.configuration }}

    # 5. リリース用成果物を集約
    - name: Prepare Release Artifacts
      shell: bash
      run: |
        mkdir release_assets
        cp ./otosun-portable-lightweight.zip ./release_assets/
        cp ./otosun-portable-standalone.zip ./release_assets/
        find ./ -name "*.msi" | xargs -I {} cp {} ./release_assets/

    # 6. GitHub Releaseの作成とアップロード
    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release_assets/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
